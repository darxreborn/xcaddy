name: Watch Caddy releases & publish xcaddy

on:
  schedule:
    - cron: "0 */6 * * *"   # watcher: build only if a new Caddy release appeared
    - cron: "0 5 * * 1"     # Mondays: forced rebuild to pull latest modules (@main / unpinned)
  # Manual trigger (always builds latest)
  workflow_dispatch:
  # Rebuild when the Dockerfile or this workflow changes
  push:
    branches: [ "master" ]
    paths:
      - "Dockerfile"
      - ".github/workflows/build.yml"

concurrency:
  group: xcaddy-build
  cancel-in-progress: false

env:
  IMAGE: darxreborn/xcaddy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine latest Caddy release & whether it's already built
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Latest published Caddy release, e.g. v2.9.1 -> 2.9.1
          version=$(gh api repos/caddyserver/caddy/releases/latest --jq .tag_name | sed 's/^v//')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Latest Caddy release: $version"

          # Manual runs, Dockerfile changes, and the weekly forced rebuild always build.
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Non-schedule event (${{ github.event_name }}) -> building."
            exit 0
          fi
          if [ "${{ github.event.schedule }}" = "0 5 * * 1" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Weekly forced rebuild -> building to refresh modules."
            exit 0
          fi

          # Scheduled watcher: only build if this version isn't on Docker Hub yet.
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${version}")
          if [ "$code" = "200" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${version} already exists -> nothing to do."
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "New release ${version} detected -> building."
          fi

      - name: Set up Buildx
        if: steps.check.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.check.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (latest + version)
        if: steps.check.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            CADDY_VERSION=${{ steps.check.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.check.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
