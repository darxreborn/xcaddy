name: Build & push xcaddy

on:
  # Rebuild weekly to pick up new upstream releases of caddy + the modules
  # (crowdsec-bouncer tracks @main, base image is the floating caddy:2 tag).
  schedule:
    - cron: "0 4 * * 1"   # Mondays 04:00 UTC
  # Manual trigger button in the Actions tab
  workflow_dispatch:
  # Rebuild when the Dockerfile or this workflow changes
  push:
    branches: [ "master" ]
    paths:
      - "Dockerfile"
      - ".github/workflows/build.yml"

concurrency:
  group: xcaddy-build
  cancel-in-progress: false

env:
  IMAGE: darxreborn/xcaddy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve current Caddy version (for tagging)
        id: caddy
        run: |
          ver=$(docker run --rm caddy:2 caddy version | awk '{print $1}' | sed 's/^v//')
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Caddy version: $ver"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.caddy.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
